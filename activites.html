<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activités — MesVacances</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">✈️ MesVacances</div>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="planner.html">Planifier</a>
      <a href="activites.html" class="active">Activités</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>Activités</h1>
      <p>Gérez les activités de vos voyages</p>
    </div>
  </div>

  <main class="container">
    <!-- Sélecteur de voyage -->
    <div class="voyage-selector">
      <label for="select-voyage">Choisir un voyage :</label>
      <select id="select-voyage" onchange="loadVoyage(this.value)">
        <option value="">-- Sélectionner un voyage --</option>
      </select>
      <a href="planner.html" class="btn-secondary">+ Nouveau voyage</a>
    </div>

    <div id="activites-section" class="hidden">
      <div class="activites-layout">
        <!-- Ajouter une activité -->
        <div class="form-card">
          <h2>Ajouter une activité</h2>
          <form id="activite-form">
            <div class="form-group">
              <label for="act-nom">🎯 Activité</label>
              <input type="text" id="act-nom" placeholder="Ex: Visite du Louvre, Snorkeling..." required>
            </div>
            <div class="form-group">
              <label for="act-date">📅 Date</label>
              <input type="date" id="act-date">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="act-heure">🕐 Heure</label>
                <input type="time" id="act-heure">
              </div>
              <div class="form-group">
                <label for="act-cout">💶 Coût (€)</label>
                <input type="number" id="act-cout" placeholder="0" min="0">
              </div>
            </div>
            <div class="form-group">
              <label for="act-categorie">🏷️ Catégorie</label>
              <select id="act-categorie">
                <option value="culture">🏛️ Culture</option>
                <option value="sport">🏄 Sport &amp; Aventure</option>
                <option value="gastronomie">🍽️ Gastronomie</option>
                <option value="nature">🌿 Nature</option>
                <option value="shopping">🛍️ Shopping</option>
                <option value="transport">🚌 Transport</option>
                <option value="logement">🏨 Logement</option>
                <option value="autre">⭐ Autre</option>
              </select>
            </div>
            <div class="form-group">
              <label for="act-notes">📝 Notes</label>
              <textarea id="act-notes" rows="2" placeholder="Adresse, réservation, conseils..."></textarea>
            </div>
            <button type="submit" class="btn-primary btn-full">Ajouter</button>
          </form>
        </div>

        <!-- Liste des activités -->
        <div class="activites-list-section">
          <div class="activites-header">
            <h2>Programme <span class="badge" id="act-count">0</span></h2>
            <div class="budget-summary" id="budget-summary"></div>
          </div>

          <div class="filter-tabs">
            <button class="tab active" onclick="filterActs('all', this)">Toutes</button>
            <button class="tab" onclick="filterActs('culture', this)">🏛️ Culture</button>
            <button class="tab" onclick="filterActs('sport', this)">🏄 Sport</button>
            <button class="tab" onclick="filterActs('gastronomie', this)">🍽️ Gastro</button>
            <button class="tab" onclick="filterActs('nature', this)">🌿 Nature</button>
          </div>

          <div id="activites-list"></div>
        </div>
      </div>
    </div>

    <div id="no-voyage" class="empty-state">
      <span>🗺️</span>
      <p>Sélectionnez un voyage pour gérer ses activités</p>
      <a href="planner.html" class="btn-primary">Créer un voyage</a>
    </div>
  </main>

  <footer class="footer">
    <p>✈️ MesVacances — Votre compagnon de voyage</p>
  </footer>

  <script src="app.js"></script>
  <script>
    let currentVoyageId = null;
    let currentFilter = 'all';

    function initPage() {
      const voyages = getVoyages();
      const select = document.getElementById('select-voyage');
      select.innerHTML = '<option value="">-- Sélectionner un voyage --</option>';
      voyages.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        opt.textContent = `${typeEmoji(v.type)} ${v.destination} (${formatDate(v.dateDepart)})`;
        select.appendChild(opt);
      });

      // Auto-sélectionner si ?id= dans URL
      const params = new URLSearchParams(window.location.search);
      const idParam = params.get('id');
      if (idParam) {
        select.value = idParam;
        loadVoyage(idParam);
      }
    }

    function loadVoyage(id) {
      currentVoyageId = id ? Number(id) : null;
      if (!currentVoyageId) {
        document.getElementById('activites-section').classList.add('hidden');
        document.getElementById('no-voyage').classList.remove('hidden');
        return;
      }
      document.getElementById('activites-section').classList.remove('hidden');
      document.getElementById('no-voyage').classList.add('hidden');

      const voyages = getVoyages();
      const v = voyages.find(x => x.id === currentVoyageId);
      if (v) {
        document.getElementById('act-date').min = v.dateDepart;
        document.getElementById('act-date').max = v.dateRetour;
        document.getElementById('act-date').value = v.dateDepart;
      }
      renderActivites();
    }

    document.getElementById('activite-form').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!currentVoyageId) return;

      const act = {
        id: Date.now(),
        nom: document.getElementById('act-nom').value,
        date: document.getElementById('act-date').value,
        heure: document.getElementById('act-heure').value,
        cout: Number(document.getElementById('act-cout').value) || 0,
        categorie: document.getElementById('act-categorie').value,
        notes: document.getElementById('act-notes').value,
        fait: false
      };

      const voyages = getVoyages();
      const v = voyages.find(x => x.id === currentVoyageId);
      if (!v) return;
      v.activites = v.activites || [];
      v.activites.push(act);
      localStorage.setItem('voyages', JSON.stringify(voyages));

      document.getElementById('act-nom').value = '';
      document.getElementById('act-heure').value = '';
      document.getElementById('act-cout').value = '';
      document.getElementById('act-notes').value = '';
      renderActivites();
      showToast('Activité ajoutée !');
    });

    function renderActivites() {
      const voyages = getVoyages();
      const v = voyages.find(x => x.id === currentVoyageId);
      if (!v) return;

      const activites = (v.activites || []).sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return a.date.localeCompare(b.date) || (a.heure || '').localeCompare(b.heure || '');
      });

      const filtered = currentFilter === 'all' ? activites : activites.filter(a => a.categorie === currentFilter);
      document.getElementById('act-count').textContent = activites.length;

      const totalCout = activites.reduce((s, a) => s + a.cout, 0);
      const budgetEl = document.getElementById('budget-summary');
      if (totalCout > 0) {
        budgetEl.innerHTML = `<span class="budget-tag">💶 Total activités : <strong>${totalCout.toLocaleString()} €</strong></span>`;
      } else {
        budgetEl.innerHTML = '';
      }

      const list = document.getElementById('activites-list');
      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty-text">Aucune activité dans cette catégorie</p>';
        return;
      }

      let lastDate = null;
      list.innerHTML = filtered.map(act => {
        let dateHeader = '';
        if (act.date && act.date !== lastDate) {
          lastDate = act.date;
          dateHeader = `<div class="date-separator">${formatDate(act.date)}</div>`;
        }
        return `${dateHeader}
        <div class="act-card ${act.fait ? 'done' : ''}" id="act-${act.id}">
          <div class="act-main">
            <span class="act-cat">${catEmoji(act.categorie)}</span>
            <div class="act-info">
              <strong>${act.nom}</strong>
              ${act.heure ? `<small>🕐 ${act.heure}</small>` : ''}
              ${act.notes ? `<small class="act-notes-text">${act.notes}</small>` : ''}
            </div>
          </div>
          <div class="act-actions">
            ${act.cout > 0 ? `<span class="act-cout">${act.cout} €</span>` : ''}
            <button class="btn-check ${act.fait ? 'checked' : ''}" onclick="toggleFait(${act.id})">${act.fait ? '✅' : '⬜'}</button>
            <button class="btn-delete" onclick="deleteActivite(${act.id})">🗑️</button>
          </div>
        </div>`;
      }).join('');
    }

    function toggleFait(actId) {
      const voyages = getVoyages();
      const v = voyages.find(x => x.id === currentVoyageId);
      if (!v) return;
      const act = v.activites.find(a => a.id === actId);
      if (act) act.fait = !act.fait;
      localStorage.setItem('voyages', JSON.stringify(voyages));
      renderActivites();
    }

    function deleteActivite(actId) {
      const voyages = getVoyages();
      const v = voyages.find(x => x.id === currentVoyageId);
      if (!v) return;
      v.activites = v.activites.filter(a => a.id !== actId);
      localStorage.setItem('voyages', JSON.stringify(voyages));
      renderActivites();
      showToast('Activité supprimée');
    }

    function filterActs(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderActivites();
    }

    function catEmoji(cat) {
      const map = { culture: '🏛️', sport: '🏄', gastronomie: '🍽️', nature: '🌿', shopping: '🛍️', transport: '🚌', logement: '🏨', autre: '⭐' };
      return map[cat] || '⭐';
    }

    initPage();
  </script>
</body>
</html>
