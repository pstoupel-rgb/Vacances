<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>La Chasse au Trésor de Corse 🏴‍☠️</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chasse au Trésor">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f4e4a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="../icon-ldf-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Baloo+2:wght@500;600;700;800&display=swap">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --sea:#1f4e4a; --sea2:#2a6b63; --sand:#f3e6c8; --sand2:#e8d6a8;
    --ink:#3a2a17; --ink2:#6b533a; --gold:#e0a915; --gold2:#c78a06;
    --wood:#8a5a2b; --wood2:#6d4420; --red:#c0392b; --green:#2f8f4e;
    --card:#fbf3dd; --border:#d9c48f;
    --radius:18px; --shadow:0 8px 24px rgba(0,0,0,.25);
    --ff-title:'Pirata One',cursive; --ff:'Baloo 2','Trebuchet MS',sans-serif;
  }
  html{-webkit-text-size-adjust:100%;height:100%;}
  body{
    font-family:var(--ff); color:var(--ink);
    min-height:100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.10), transparent 40%),
      repeating-linear-gradient(45deg, rgba(0,0,0,.02) 0 12px, transparent 12px 24px),
      linear-gradient(160deg,#1f4e4a,#123330);
    -webkit-user-select:none; user-select:none;
    overflow-x:hidden;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;
    padding:calc(env(safe-area-inset-top) + 8px) 14px calc(env(safe-area-inset-bottom) + 24px);
    display:flex;flex-direction:column;}

  /* ---- Boutons ---- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:var(--ff);font-weight:800;font-size:1.1rem;color:#fff;
    background:linear-gradient(180deg,var(--gold),var(--gold2));
    border:none;border-radius:14px;padding:15px 22px;cursor:pointer;
    box-shadow:0 5px 0 #9a6a04, var(--shadow);width:100%;
    transition:transform .06s, box-shadow .06s;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #9a6a04;}
  .btn.sea{background:linear-gradient(180deg,#2a7d73,#1c5850);box-shadow:0 5px 0 #123b36,var(--shadow);}
  .btn.ghost{background:rgba(255,255,255,.12);box-shadow:none;border:2px solid rgba(255,255,255,.35);color:#fff;}
  .btn.ghost.small,.btn.ghost{box-shadow:none;}
  .btn.small{font-size:.95rem;padding:11px 16px;box-shadow:0 4px 0 #9a6a04;}
  .btn.sea.small{box-shadow:0 4px 0 #123b36;}
  .btn:disabled{opacity:.5;filter:grayscale(.4);}

  /* ---- Cartes parchemin ---- */
  .parch{background:linear-gradient(180deg,var(--card),#f3e7c6);
    border:2px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;position:relative;}
  .parch::after{content:"";position:absolute;inset:5px;border:1.5px dashed rgba(120,90,40,.35);
    border-radius:12px;pointer-events:none;}

  h1,h2,h3{font-family:var(--ff-title);letter-spacing:.5px;font-weight:400;line-height:1.05;}
  .center{text-align:center;}

  /* ---- HOME ---- */
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:20px 0;}
  .hero .flag{font-size:5rem;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4));animation:sway 3s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .hero h1{color:var(--gold);font-size:2.9rem;text-shadow:0 3px 0 #7a4d00,0 6px 14px rgba(0,0,0,.4);}
  .hero .sub{color:#f3e6c8;font-size:1.05rem;font-weight:600;max-width:300px;}
  .hero .isle{color:#bfe3d5;font-size:.9rem;font-weight:600;}
  .home-btns{width:100%;display:flex;flex-direction:column;gap:12px;max-width:340px;margin-top:6px;}

  /* ---- SETUP ---- */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .topbar .back{background:rgba(255,255,255,.14);border:none;color:#fff;font-size:1.3rem;
    width:42px;height:42px;border-radius:12px;flex:0 0 auto;cursor:pointer;font-weight:800;}
  .topbar h2{color:#fff;font-size:1.5rem;flex:1;}
  .lead{color:#f3e6c8;font-weight:600;font-size:.95rem;margin-bottom:12px;line-height:1.35;}

  .player{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .player .emoji{font-size:1.6rem;flex:0 0 auto;width:34px;text-align:center;}
  .player input.name{flex:1;min-width:0;font-family:var(--ff);font-weight:700;font-size:1rem;
    padding:11px 12px;border:2px solid var(--border);border-radius:12px;background:#fff;color:var(--ink);}
  .agebox{display:flex;align-items:center;gap:4px;background:#fff;border:2px solid var(--border);border-radius:12px;padding:4px 6px;flex:0 0 auto;}
  .agebox button{width:30px;height:30px;border:none;border-radius:8px;background:var(--sand2);
    font-weight:800;font-size:1.2rem;color:var(--ink);cursor:pointer;line-height:1;}
  .agebox .val{width:40px;text-align:center;font-weight:800;font-size:.95rem;}
  .agebox .val small{display:block;font-size:.6rem;color:var(--ink2);font-weight:700;margin-top:-2px;}
  .player .del{background:none;border:none;color:var(--red);font-size:1.3rem;cursor:pointer;flex:0 0 auto;width:30px;}
  .addp{background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.4);color:#fff;
    border-radius:12px;padding:11px;width:100%;font-family:var(--ff);font-weight:700;cursor:pointer;margin-top:4px;font-size:.95rem;}

  /* ---- MAP ---- */
  .maphead{text-align:center;margin-bottom:8px;}
  .maphead h2{color:var(--gold);font-size:2rem;text-shadow:0 2px 0 #7a4d00;}
  .maphead p{color:#e8d6a8;font-weight:600;font-size:.9rem;}
  .chestbar{display:flex;gap:6px;justify-content:center;margin:10px 0 18px;flex-wrap:wrap;}
  .digit{width:44px;height:54px;border-radius:10px;background:#123330;border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-title);
    font-size:1.9rem;color:var(--gold);box-shadow:inset 0 2px 6px rgba(0,0,0,.5);}
  .digit.empty{color:#3a5c57;border-color:#2f5b55;}
  .wordchip{min-width:40px;padding:6px 10px;border-radius:10px;background:#123330;border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-title);
    font-size:1.05rem;color:var(--gold);box-shadow:inset 0 2px 6px rgba(0,0,0,.5);}
  .wordchip.empty{color:#3a5c57;border-color:#2f5b55;}

  .trail{position:relative;padding-left:6px;}
  .st{display:flex;gap:12px;align-items:stretch;margin-bottom:12px;position:relative;}
  .st .node{flex:0 0 auto;width:54px;display:flex;flex-direction:column;align-items:center;}
  .st .dot{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;background:var(--sand);border:3px solid var(--wood);box-shadow:var(--shadow);z-index:2;}
  .st .line{flex:1;width:4px;background:repeating-linear-gradient(var(--gold) 0 6px,transparent 6px 12px);margin:2px 0;}
  .st:last-child .line{display:none;}
  .st.done .dot{background:linear-gradient(180deg,#3fbf6a,#2f8f4e);border-color:#1f6a3a;color:#fff;}
  .st.locked .dot{filter:grayscale(1);opacity:.7;}
  .st .body{flex:1;background:linear-gradient(180deg,var(--card),#f3e7c6);border:2px solid var(--border);
    border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;min-width:0;}
  .st.locked .body{cursor:default;opacity:.75;}
  .st .body h3{font-family:var(--ff);font-weight:800;font-size:1.05rem;color:var(--ink);}
  .st .body .clue{font-size:.82rem;color:var(--ink2);font-weight:600;margin-top:2px;line-height:1.25;}
  .st .body .tag{display:inline-block;margin-top:6px;font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:20px;}
  .tag.play{background:var(--sea);color:#fff;} .tag.ok{background:var(--green);color:#fff;} .tag.lock{background:#b9a677;color:#fff;}

  /* ---- STATION ---- */
  .stationwrap{display:flex;flex-direction:column;gap:14px;}
  .bigemoji{font-size:3rem;text-align:center;}
  .st-title{color:var(--gold);font-size:2rem;text-align:center;text-shadow:0 2px 0 #7a4d00;}
  .section-label{font-family:var(--ff-title);font-size:1.15rem;color:var(--wood);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .clue-box{background:#fff7e2;border-left:5px solid var(--gold);border-radius:10px;padding:12px 14px;font-weight:600;font-style:italic;color:var(--ink2);}
  .missions{display:flex;flex-direction:column;gap:8px;}
  .mission{display:flex;gap:10px;align-items:center;background:#fff;border:2px solid var(--border);border-radius:12px;padding:9px 11px;}
  .mission .mrank{flex:0 0 auto;text-align:center;line-height:1.05;}
  .mission .mrank .em{font-size:1.5rem;} .mission .mrank .rk{font-size:.6rem;font-weight:800;color:var(--wood);text-transform:uppercase;}
  .mission .mtxt{font-size:.9rem;font-weight:600;} .mission .mtxt b{color:var(--sea2);}

  .game{background:#fff;border:2px solid var(--border);border-radius:14px;padding:14px;}
  .q{font-weight:800;font-size:1.02rem;margin-bottom:10px;}
  .opts{display:flex;flex-direction:column;gap:9px;}
  .opt{padding:13px 14px;border:2px solid var(--border);border-radius:12px;background:var(--sand);
    font-family:var(--ff);font-weight:700;font-size:1rem;cursor:pointer;text-align:left;color:var(--ink);}
  .opt.good{background:var(--green);color:#fff;border-color:#1f6a3a;}
  .opt.bad{background:var(--red);color:#fff;border-color:#8f2318;animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .qprog{text-align:center;font-weight:700;color:var(--ink2);font-size:.85rem;margin-top:8px;}

  /* stones */
  .stonegrid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;justify-items:center;}
  .stone{font-size:1.7rem;cursor:pointer;transition:transform .1s;padding:2px;}
  .stone:active{transform:scale(.8);}

  /* memory */
  .memgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .mcard{aspect-ratio:1;border-radius:12px;font-size:1.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:linear-gradient(180deg,var(--sea2),var(--sea));color:transparent;border:2px solid #123330;transition:transform .15s;}
  .mcard.up{background:var(--sand);color:var(--ink);border-color:var(--wood);}
  .mcard.matched{background:linear-gradient(180deg,#3fbf6a,#2f8f4e);color:#fff;border-color:#1f6a3a;}

  /* caesar */
  .cipher{font-family:var(--ff-title);font-size:1.35rem;letter-spacing:2px;text-align:center;color:var(--sea);
    background:#fff7e2;padding:12px;border-radius:10px;word-break:break-word;line-height:1.4;}
  .wheel{display:flex;align-items:center;gap:10px;margin:12px 0;}
  .wheel input[type=range]{flex:1;accent-color:var(--gold);height:30px;}
  .wheel .shiftval{font-family:var(--ff-title);font-size:1.5rem;color:var(--wood);width:42px;text-align:center;}

  /* text input answer */
  .ansrow{display:flex;gap:8px;margin-top:12px;}
  .ansrow input{flex:1;min-width:0;font-family:var(--ff);font-weight:700;font-size:1.1rem;text-transform:uppercase;
    padding:12px;border:2px solid var(--border);border-radius:12px;text-align:center;background:#fff;color:var(--ink);}

  /* lock dials */
  .lock{display:flex;gap:8px;justify-content:center;margin:14px 0;}
  .dial{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .dial button{width:40px;height:34px;border:none;border-radius:9px;background:var(--wood);color:#fff;font-size:1.2rem;font-weight:800;cursor:pointer;}
  .dial .num{width:46px;height:56px;background:#123330;border:2px solid var(--gold);border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-title);font-size:2rem;color:var(--gold);}
  .riddles{list-style:none;display:flex;flex-direction:column;gap:6px;margin:6px 0 4px;}
  .riddles li{font-size:.85rem;font-weight:600;background:#fff7e2;border-radius:8px;padding:7px 10px;color:var(--ink2);}
  .riddles li b{color:var(--sea2);}

  .msg{text-align:center;font-weight:800;padding:10px;border-radius:10px;margin-top:10px;}
  .msg.win{background:#dff5e4;color:var(--green);} .msg.err{background:#fbe3df;color:var(--red);}

  .reward{background:linear-gradient(180deg,#fff3cf,#ffe6a0);border:2px solid var(--gold);border-radius:14px;
    text-align:center;padding:16px;}
  .reward .rd{font-family:var(--ff-title);font-size:3rem;color:var(--gold2);text-shadow:0 2px 0 #fff;}

  /* ---- TREASURE ---- */
  .treasure{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;}
  .treasure .chest{font-size:6rem;animation:pop .6s cubic-bezier(.2,.9,.3,1.4);}
  @keyframes pop{0%{transform:scale(.3) rotate(-10deg);opacity:0}100%{transform:scale(1)}}
  .treasure h1{color:var(--gold);font-size:3rem;text-shadow:0 3px 0 #7a4d00;}
  .treasure .final{background:linear-gradient(180deg,var(--card),#f3e7c6);border:2px solid var(--gold);
    border-radius:16px;padding:18px;font-weight:700;font-size:1.1rem;color:var(--ink);max-width:360px;box-shadow:var(--shadow);}

  /* confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
  .conf{position:absolute;top:-20px;width:10px;height:16px;border-radius:2px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

  .hint-btn{background:none;border:none;color:var(--sea2);font-weight:800;text-decoration:underline;cursor:pointer;font-size:.85rem;margin-top:8px;}
  .footnote{color:#bfe3d5;font-size:.78rem;text-align:center;margin-top:14px;font-weight:600;}
  .foot-actions{display:flex;gap:8px;margin-top:14px;}
  textarea.treasure-set{width:100%;font-family:var(--ff);font-weight:600;font-size:.95rem;padding:11px;
    border:2px solid var(--border);border-radius:12px;background:#fff;color:var(--ink);min-height:80px;resize:vertical;}
  .guide-txt{font-size:.9rem;font-weight:600;color:var(--ink2);line-height:1.45;}
  .guide-txt b{color:var(--sea2);}
  .guide-txt ul,.guide-txt ol{margin:8px 0 2px;padding-left:22px;}
  .guide-txt li{margin:5px 0;}

  /* piscine par enfant */
  .poolgrid{display:flex;flex-direction:column;gap:8px;}
  .poolcard{display:flex;align-items:center;gap:11px;width:100%;background:var(--sand);border:2px solid var(--border);
    border-radius:12px;padding:10px 12px;cursor:pointer;font-family:var(--ff);text-align:left;}
  .poolcard:active{transform:scale(.99);}
  .poolcard.done{background:#dff5e4;border-color:#2f8f4e;}
  .poolcard .pc-em{font-size:1.6rem;flex:0 0 auto;}
  .poolcard .pc-info{flex:1;display:flex;flex-direction:column;line-height:1.15;min-width:0;}
  .poolcard .pc-info b{font-size:1rem;color:var(--ink);}
  .poolcard .pc-info span{font-size:.75rem;color:var(--ink2);font-weight:600;}
  .poolcard .pc-stat{font-size:1.3rem;flex:0 0 auto;}
  .pool-q{font-weight:700;font-size:1.05rem;text-align:center;background:#fff7e2;border-radius:10px;padding:14px;margin:10px 0;line-height:1.45;}
  .bigduck{font-size:1.9rem;letter-spacing:4px;display:inline-block;margin:4px 0;}

  /* mode test (parents) */
  .test-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
  .test-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;
    border:2px solid var(--border);border-radius:10px;padding:7px 10px;font-weight:700;font-size:.9rem;color:var(--ink);}
  .test-row .tbtn{border:none;border-radius:8px;padding:8px 15px;font-family:var(--ff);font-weight:800;
    font-size:.85rem;cursor:pointer;color:#fff;flex:0 0 auto;}
  .tbtn.cancel{background:var(--red);} .tbtn.valid{background:var(--sea2);}

  /* équipes & scores */
  :root{--t1a:#2a90b0;--t1b:#1f6f8b;--t2a:#c85aa6;--t2b:#a83d86;}
  .scoreboard{display:flex;gap:8px;margin:6px 0;}
  .sb{flex:1;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:9px 12px;
    border-radius:12px;color:#fff;font-weight:800;font-size:.85rem;box-shadow:var(--shadow);min-width:0;}
  .sb span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sb b{font-family:var(--ff-title);font-size:1.5rem;flex:0 0 auto;}
  .sb.team1{background:linear-gradient(180deg,var(--t1a),var(--t1b));}
  .sb.team2{background:linear-gradient(180deg,var(--t2a),var(--t2b));}
  .teams2{display:flex;flex-direction:column;gap:14px;}
  .teamcol{display:flex;flex-direction:column;gap:8px;}
  .teamhd{font-family:var(--ff-title);font-size:1.05rem;text-align:center;padding:6px;border-radius:10px;color:#fff;}
  .teamcol.team1 .teamhd{background:var(--t1b);} .teamcol.team2 .teamhd{background:var(--t2b);}
  .ptsbadge{background:var(--gold);color:#fff;font-size:.7rem;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap;}
  .teamchip{flex:0 0 auto;width:40px;height:40px;border:none;border-radius:11px;font-size:1.4rem;cursor:pointer;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
  .teamchip.team1{background:var(--t1a);} .teamchip.team2{background:var(--t2a);}
  .teamlegend{display:flex;gap:8px;margin-bottom:12px;}
  .teamlegend .tl{flex:1;text-align:center;padding:8px;border-radius:11px;color:#fff;font-weight:800;font-size:.85rem;}
  .teamlegend .tl.team1{background:var(--t1b);} .teamlegend .tl.team2{background:var(--t2b);}

  /* épreuves bonus */
  .bonusgrid{display:flex;flex-direction:column;gap:10px;}
  .bonuscard{display:flex;align-items:center;gap:12px;width:100%;text-align:left;font-family:var(--ff);
    background:linear-gradient(180deg,var(--card),#f3e7c6);border:2px solid var(--gold);border-radius:14px;padding:12px;cursor:pointer;box-shadow:var(--shadow);}
  .bonuscard.done{border-color:var(--green);}
  .bonuscard .bo-em{font-size:2rem;flex:0 0 auto;}
  .bonuscard .bo-info{min-width:0;}
  .bonuscard .bo-info b{display:block;font-size:1.05rem;color:var(--ink);}
  .bonuscard .bo-info span{font-size:.8rem;color:var(--ink2);font-weight:600;line-height:1.25;}

  /* roue */
  .wheelwrap{position:relative;width:200px;height:200px;margin:14px auto 6px;}
  .wpointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:1.8rem;color:var(--red);z-index:3;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .wheel{width:200px;height:200px;border-radius:50%;border:6px solid var(--wood);box-shadow:var(--shadow),inset 0 0 0 2px #fff;position:relative;transform:rotate(0deg);}
  .wheel .wlabel{position:absolute;top:50%;left:50%;width:0;height:0;display:flex;align-items:center;justify-content:center;}
  .wheel .wlabel span{display:inline-block;font-family:var(--ff-title);font-size:1.2rem;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .costumebtns{display:flex;flex-direction:column;gap:10px;}

  /* cailloux mystères */
  .cslots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0 14px;}
  .cslot{width:34px;height:44px;border-radius:8px;background:#123330;border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:var(--ff-title);font-size:1.5rem;color:var(--gold);}
  .cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;justify-items:center;}
  .cstone{width:100%;aspect-ratio:1;border:none;border-radius:12px;background:linear-gradient(180deg,#c9c1b0,#a89e88);
    font-size:1.7rem;cursor:pointer;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);transition:transform .1s;}
  .cstone:active{transform:scale(.9);}
  .cstone.up{background:#efe7d0;box-shadow:inset 0 0 0 2px var(--border);}
  .cstone.up.letter{background:linear-gradient(180deg,#3fbf6a,#2f8f4e);color:#fff;font-family:var(--ff-title);}

  /* énigme finale (mots) */
  .phrasebox{min-height:44px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;
    background:#fff7e2;border-radius:10px;padding:12px;margin-bottom:12px;}

  .wtile{position:relative;font-family:var(--ff-title);font-size:1.15rem;color:#fff;
    background:linear-gradient(180deg,var(--wood),var(--wood2));border:none;border-radius:11px;
    padding:11px 15px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);}
  .wtile:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25);}
  .wtile.placed{background:linear-gradient(180deg,var(--gold),var(--gold2));box-shadow:none;cursor:default;}
  .wtile .wnum{position:absolute;top:-8px;left:-8px;width:22px;height:22px;border-radius:50%;background:var(--sea2);
    color:#fff;font-size:.75rem;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.3);}

  /* eau glacée (chrono) */
  .icetimer{font-family:var(--ff-title);font-size:3.4rem;color:#1f6f8b;margin:10px 0 6px;letter-spacing:2px;}
  .icebar{height:16px;background:#d8e8ee;border-radius:20px;overflow:hidden;border:2px solid #9cc4d2;}
  .icebar-fill{height:100%;background:linear-gradient(90deg,#5ec6e8,#2a90b0);width:0;transition:width .4s linear;}
  .bigflag{display:block;font-size:3.5rem;margin:8px 0;line-height:1;}
</style>
</head>
<body>
<div id="app"></div>
<div id="confetti"></div>

<script>
"use strict";
/* ============================================================
   LA CHASSE AU TRÉSOR DE CORSE — mini-app 100% hors-ligne
   ============================================================ */

const STORE_KEY = 'chasse-corse-v3';
const THEME = {piscine:'piscine', gravier:'gravier', 'terrasse-avant':'terrasse', 'terrasse-arriere':'terrasse', cuisine:'cuisine'};
function kidPoints(age){ if(age<=7)return 5; if(age<=9)return 6; if(age<=11)return 8; if(age<=13)return 10; if(age<=15)return 12; return 14; }

/* ---- Grades par âge ---- */
function grade(age){
  if(age<=7)  return {rank:'Mousse',    em:'🐣'};
  if(age<=10) return {rank:'Matelot',   em:'⚓'};
  if(age<=13) return {rank:'Corsaire',  em:'🗡️'};
  return           {rank:'Capitaine', em:'🧭'};
}
function tier(age){ if(age<=7)return 0; if(age<=10)return 1; if(age<=13)return 2; return 3; }

/* ---- Les stations ---- */
const STATIONS = [
  {
    id:'piscine', emoji:'🏊', name:'La Piscine',
    clue:"Rendez-vous là où l'eau est bleue, où l'on fait des bombes et des étoiles de mer !",
    digit:4, game:'poolIndiv',
    missions:[
      "Fais 3 bisous à la surface de l'eau en les comptant à voix haute 💦",
      "Trouve un objet qui <b>flotte</b> et un objet qui <b>coule</b>.",
      "Réussis <b>ton</b> défi piscine, puis aide un plus jeune à réussir le sien 💪",
      "Tu es le maître-nageur 🛟 : réussis ton défi et vérifie que tout l'équipage a réussi le sien."
    ]
  },
  {
    id:'gravier', emoji:'🪨', name:'Le Jardin de Gravier',
    clue:"Cherchez le coin qui crisse sous les pieds… là où mille cailloux dorment au soleil.",
    digit:8, game:'stones',
    missions:[
      "Ramasse <b>8 cailloux</b> et fais-en un petit tas trésor.",
      "Trouve le caillou le plus <b>rond</b> et le plus rigolo du jardin.",
      "Cache 3 cailloux pour plus tard et retiens bien où !",
      "Repère le <b>caillou d'or</b> sur l'écran avant tout le monde 🪙."
    ]
  },
  {
    id:'terrasse-avant', emoji:'🛋️', name:'La Terrasse de Devant',
    clue:"File vers la grande terrasse à l'avant de la maison : un pirate a glissé un message secret près du canapé.",
    digit:6, game:'caesar',
    missions:[
      "Soulève les coussins du canapé de devant : un trésor s'y cache peut-être ! 🛋️",
      "Fais le tour de la terrasse et compte les coussins du canapé.",
      "Aide à tourner la molette du décodeur secret.",
      "Décode le message et lis-le à voix haute à l'équipage 📜."
    ]
  },
  {
    id:'terrasse-arriere', emoji:'🪑', name:'La Terrasse de Derrière',
    clue:"Fais le tour jusqu'à la terrasse à l'arrière de la maison, près de l'autre canapé : le dernier mot de l'énigme s'y cache.",
    digit:1, game:'lock',
    missions:[
      "Réponds : combien de doigts sur <b>une main</b> ? ✋",
      "Compte les coussins du canapé de derrière.",
      "Résous les énigmes de chiffres.",
      "Compose le code du cadenas sans te tromper 🔐."
    ]
  },
  {
    id:'cuisine', emoji:'🍽️', name:'La Cuisine',
    clue:"Dernière étape : le repaire des bonnes odeurs, là où l'on prépare le festin des pirates.",
    digit:2, game:'memory',
    missions:[
      "Sens un aliment les yeux fermés 👀 et devine ce que c'est.",
      "Trouve quelque chose de <b>rouge</b> et quelque chose de <b>sucré</b>.",
      "Gagne au Memory des saveurs corses.",
      "Invente le nom d'un cocktail de pirate (sans alcool 🍹 !)."
    ]
  }
];

/* ---- Épreuves BONUS (points d'équipe + trésors perso, sans chiffre du coffre) ---- */
const BONUS = [
  { id:'roue',        emoji:'🎡', name:'La Roue de la Fortune',
    desc:"Chaque pirate tourne la roue et gagne SON trésor rien qu'à lui 🎁" },
  { id:'cailloux',    emoji:'🪨', name:'Les Cailloux Mystères',
    desc:"Soulevez les cailloux : sous certains se cachent les lettres d'un indice secret 🔎" },
  { id:'deguisement', emoji:'🎭', name:'Le Concours de Déguisement',
    desc:"Défilé des pirates ! +1 point à l'équipe la mieux déguisée (c'est le juge qui décide)." },
  { id:'danse',       emoji:'💃', name:'Le Grand Défi Danse',
    desc:"Chaque équipe prépare une danse rigolote, puis la présente : +2 points à la meilleure 🏆" },
  { id:'degustation', emoji:'🫣', name:'La Dégustation à l\'Aveugle',
    desc:"Les yeux bandés, goûtez le produit mystère choisi par le parent 😋" },
  { id:'eauglacee',   emoji:'🧊', name:'L\'Épreuve de l\'Eau Glacée',
    desc:"Chaque joueur doit tenir au moins 1 min 30 dans l'eau glacée ⏱️ (chrono dans l'app)." },
  { id:'panini',      emoji:'⚽', name:'Le Défi Panini (Coupe du Monde)',
    desc:"Drapeaux et questions Coupe du Monde ! Chaque joueur répond et marque pour son équipe 🏆" }
];

/* ---- État ---- */
let S = load();

function defaultState(){
  return {
    screen:'home',
    started:false,
    players:[
      {name:'Victor', age:7,  team:1},
      {name:'Clea',   age:8,  team:2},
      {name:'Vic',    age:12, team:1},
      {name:'Lélé',   age:13, team:2},
      {name:'Gatien', age:15, team:2},
      {name:'Louise', age:16, team:1}
    ],
    teams:{ 1:{name:'Les Requins', em:'🦈'}, 2:{name:'Les Dauphins', em:'🐬'} },
    done:{},           // {stationId:true}
    kidDone:{},        // {stationId:{playerIndex:true}} défis individuels réussis
    stationIdx:0,
    bonusIdx:0,
    wheelPrizes:['un paquet de bonbons 🍬','une pièce en chocolat 🪙','un petit jouet 🧸','une glace 🍦','un porte-bonheur 🐚','une petite BD 📖','un bracelet brésilien 🧵','un badge de pirate 🏴‍☠️'],
    wheelResult:{},    // {playerIndex: prixText}
    costumeWinner:0,   // 0=pas encore, 1, 2, 3=égalité
    danceWinner:0,     // idem pour le défi danse
    danceChallenge:null,
    tasteProduct:'',   // le produit mystère (choisi par le parent)
    indiceWord:'TRESOR', // mot caché sous les cailloux
    cluesFound:false,
    enigmaWords:['CHERCHE','OÙ','IL','FAIT','FRAIS'], // 1 mot par épreuve -> énigme finale
    treasureMsg:"Le vrai trésor est caché près de la piscine 🏊\nCherchez sous le transat bleu !"
  };
}
function load(){
  try{ const s=JSON.parse(localStorage.getItem(STORE_KEY)); if(s&&s.players){
    if(!s.kidDone)s.kidDone={};
    if(!s.teams)s.teams={1:{name:'Les Requins',em:'🦈'},2:{name:'Les Dauphins',em:'🐬'}};
    if(!s.wheelPrizes)s.wheelPrizes=defaultState().wheelPrizes;
    if(!s.wheelResult)s.wheelResult={};
    if(s.costumeWinner==null)s.costumeWinner=0;
    if(s.danceWinner==null)s.danceWinner=0;
    if(s.tasteProduct==null)s.tasteProduct='';
    if(!s.indiceWord)s.indiceWord='TRESOR';
    if(s.cluesFound==null)s.cluesFound=false;
    if(!s.enigmaWords||!s.enigmaWords.length)s.enigmaWords=defaultState().enigmaWords;
    if(s.bonusIdx==null)s.bonusIdx=0;
    s.players.forEach(p=>{ if(!p.team)p.team=1; });
    return s;
  } }catch(e){}
  return defaultState();
}
function computeScores(){
  const sc={1:0,2:0};
  for(const stId in S.kidDone){ const m=S.kidDone[stId]||{};
    for(const idx in m){ if(m[idx]){ const p=S.players[idx]; if(p) sc[p.team]=(sc[p.team]||0)+kidPoints(p.age); } } }
  if(S.costumeWinner===1) sc[1]+=1;
  else if(S.costumeWinner===2) sc[2]+=1;
  else if(S.costumeWinner===3){ sc[1]+=1; sc[2]+=1; }
  if(S.danceWinner===1) sc[1]+=2;
  else if(S.danceWinner===2) sc[2]+=2;
  else if(S.danceWinner===3){ sc[1]+=2; sc[2]+=2; }
  return sc;
}
function scoreboardHTML(){
  const sc=computeScores(), t=S.teams;
  return `<div class="scoreboard">
    <div class="sb team1"><span>${t[1].em} ${esc(t[1].name)}</span><b>${sc[1]}</b></div>
    <div class="sb team2"><span>${t[2].em} ${esc(t[2].name)}</span><b>${sc[2]}</b></div>
  </div>`;
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){} }

const app = document.getElementById('app');
function go(screen, idx){ S.screen=screen; if(idx!=null){ if(screen==='bonus')S.bonusIdx=idx; else S.stationIdx=idx; } save(); render(); window.scrollTo(0,0); }
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============================================================ RENDER */
function render(){
  if(window.__iceTimer){ clearInterval(window.__iceTimer); window.__iceTimer=null; }
  const scr = S.screen;
  if(scr==='home')      return renderHome();
  if(scr==='setup')     return renderSetup();
  if(scr==='map')       return renderMap();
  if(scr==='station')   return renderStation();
  if(scr==='bonus')     return renderBonus();
  if(scr==='treasure')  return renderTreasure();
  if(scr==='parents')   return renderParents();
  if(scr==='guide')     return renderGuide();
  renderHome();
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const anyProgress = Object.keys(S.done).length>0;
  app.innerHTML = `
    <div class="hero">
      <div class="flag">🏴‍☠️</div>
      <h1>La Chasse<br>au Trésor</h1>
      <div class="sub">Un trésor de pirate est caché dans la maison de Corse… À vous de le retrouver, moussaillons !</div>
      <div class="isle">🏝️ 5 épreuves &nbsp;•&nbsp; 2 équipes &nbsp;•&nbsp; de 6 à 16 ans</div>
      <div class="home-btns">
        ${anyProgress
          ? `<button class="btn" onclick="go('map')">▶️ Continuer l'aventure</button>
             <button class="btn sea" onclick="go('setup')">👥 Voir l'équipage</button>`
          : `<button class="btn" onclick="go('setup')">🚩 Commencer l'aventure</button>`}
        <button class="btn ghost small" onclick="go('parents')">⚙️ Coin des parents</button>
      </div>
    </div>
    <div class="footnote">Installe-la : bouton Partager → « Sur l'écran d'accueil »</div>
  `;
}

/* ---------------- SETUP (équipage) ---------------- */
function renderSetup(){
  const cnt={1:0,2:0}; S.players.forEach(p=>cnt[p.team]++);
  const rows = S.players.map((p,i)=>{
    const g=grade(p.age), tm=S.teams[p.team];
    return `<div class="player">
      <button class="teamchip team${p.team}" onclick="setTeam(${i})" title="Changer d'équipe">${tm.em}</button>
      <input class="name" placeholder="Prénom n°${i+1}" value="${esc(p.name)}"
        oninput="setName(${i},this.value)">
      <div class="agebox">
        <button onclick="setAge(${i},-1)">−</button>
        <div class="val">${p.age}<small>${g.rank}</small></div>
        <button onclick="setAge(${i},1)">＋</button>
      </div>
      ${S.players.length>1?`<button class="del" onclick="delPlayer(${i})">✕</button>`:''}
    </div>`;
  }).join('');
  app.innerHTML = `
    <div class="topbar"><button class="back" onclick="go('home')">‹</button><h2>L'équipage</h2></div>
    <div class="lead">2 équipes de pirates s'affrontent aux points ! Touche le pion coloré pour changer un enfant d'équipe. Les défis s'adaptent à l'âge 💪</div>
    <div class="teamlegend">
      <span class="tl team1">${S.teams[1].em} ${esc(S.teams[1].name)} · ${cnt[1]}</span>
      <span class="tl team2">${S.teams[2].em} ${esc(S.teams[2].name)} · ${cnt[2]}</span>
    </div>
    <div class="parch" style="padding-top:22px">
      ${rows}
      <button class="addp" onclick="addPlayer()">＋ Ajouter un pirate</button>
    </div>
    <div style="margin-top:16px">
      <button class="btn" onclick="startAdventure()">⚓ En route vers le trésor !</button>
    </div>
  `;
}
function setName(i,v){ S.players[i].name=v; save(); }
function setAge(i,d){ S.players[i].age=Math.max(3,Math.min(17,S.players[i].age+d)); save(); render(); }
function setTeam(i){ S.players[i].team = S.players[i].team===1?2:1; save(); render(); }
function addPlayer(){ const cnt={1:0,2:0}; S.players.forEach(p=>cnt[p.team]++); S.players.push({name:'',age:8,team:cnt[1]<=cnt[2]?1:2}); save(); render(); }
function delPlayer(i){ S.players.splice(i,1); save(); render(); }
function startAdventure(){ S.started=true; go('map'); }

/* ---------------- MAP (parcours) ---------------- */
function renderMap(){
  const dilat = STATIONS.map((st,i)=> S.done[st.id]
      ? `<div class="wordchip">${esc(stationWord(st))}</div>`
      : `<div class="wordchip empty">?</div>`).join('');
  const firstUndone = STATIONS.findIndex(st=>!S.done[st.id]);
  const allDone = firstUndone===-1;

  const trail = STATIONS.map((st,i)=>{
    const done = !!S.done[st.id];
    const unlocked = done || i<=firstUndoneIndex();
    const cls = done?'done':(unlocked?'':'locked');
    const tag = done?`<span class="tag ok">✓ Mot « ${esc(stationWord(st))} » gagné</span>`
              : unlocked?`<span class="tag play">▶ À jouer</span>`
              : `<span class="tag lock">🔒 Verrouillé</span>`;
    return `<div class="st ${cls}">
      <div class="node"><div class="dot">${done?'✓':st.emoji}</div><div class="line"></div></div>
      <div class="body" ${unlocked?`onclick="go('station',${i})"`:''}>
        <h3>${i+1}. ${st.name}</h3>
        <div class="clue">${st.clue}</div>
        ${tag}
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="topbar"><button class="back" onclick="go('home')">‹</button><h2 style="font-size:1.3rem">Carte au trésor</h2></div>
    <div class="maphead">
      <h2>L'énigme du coffre</h2>
      <p>Gagnez les 5 mots pour reconstituer l'énigme… et un max de points par équipe !</p>
      <div class="chestbar">${dilat}</div>
    </div>
    ${scoreboardHTML()}
    <div class="trail">${trail}</div>
    ${allDone
      ? `<div style="margin-top:6px"><button class="btn" onclick="go('station',${STATIONS.length})">🏴‍☠️ Ouvrir le coffre au trésor !</button></div>`
      : ``}
    <div class="section-label" style="color:var(--gold);margin:22px 0 8px;justify-content:center">⭐ Épreuves bonus</div>
    <div class="bonusgrid">
      ${BONUS.map((bo,i)=>{
        const done=bonusDone(bo.id);
        return `<button class="bonuscard ${done?'done':''}" onclick="go('bonus',${i})">
          <div class="bo-em">${done?'✅':bo.emoji}</div>
          <div class="bo-info"><b>${bo.name}</b><span>${bo.desc}</span></div>
        </button>`;
      }).join('')}
    </div>
    <div class="footnote">Astuce parents : cachez un vrai petit trésor par enfant 🎁 (la roue dit qui gagne quoi)</div>
  `;
}
function bonusDone(id){
  if(id==='roue') return S.players.length>0 && S.players.every((_,i)=>S.wheelResult[i]);
  if(id==='cailloux') return !!S.cluesFound;
  if(id==='deguisement') return S.costumeWinner!==0;
  if(id==='danse') return S.danceWinner!==0;
  if(id==='degustation') return S.players.length>0 && S.players.every((_,i)=>(S.kidDone.degustation||{})[i]);
  if(id==='eauglacee') return S.players.length>0 && S.players.every((_,i)=>(S.kidDone.eauglacee||{})[i]);
  if(id==='panini') return S.players.length>0 && S.players.every((_,i)=>(S.kidDone.panini||{})[i]);
  return false;
}
function firstUndoneIndex(){ const i=STATIONS.findIndex(st=>!S.done[st.id]); return i===-1?STATIONS.length:i; }
function stationWord(st){ const i=STATIONS.indexOf(st); return (S.enigmaWords[i]||('MOT'+(i+1))); }

/* Épreuve réussie */
function completeStation(){
  const st=STATIONS[S.stationIdx];
  S.done[st.id]=true; save();
  const z=document.getElementById('gamezone');
  z.innerHTML = `
    <div class="reward">
      <div style="font-weight:800;color:var(--wood)">Épreuve réussie par tout l'équipage ! Mot de l'énigme :</div>
      <div class="rd" style="font-size:2.1rem">${esc(stationWord(st))}</div>
      <div style="font-weight:700;color:var(--ink2);margin-bottom:10px">Retenez-le… il fait partie de l'énigme du trésor 🗝️</div>
      ${scoreboardHTML()}
      <button class="btn" style="margin-top:12px" onclick="go('map')">Continuer la chasse ➜</button>
    </div>`;
  burst(20);
}

/* ============================================================ MINI-JEUX */
function mountGame(st){
  const z=document.getElementById('gamezone');
  if(st.game==='poolIndiv') return gamePoolIndividual(z);
  if(st.game==='quiz')   return gameQuiz(z);
  if(st.game==='stones') return gameStones(z);
  if(st.game==='memory') return gameMemory(z);
  if(st.game==='caesar') return gameCaesar(z);
  if(st.game==='lock')   return gameLock(z);
}

/* ---- DÉFI INDIVIDUEL PAR ENFANT (par station, difficulté selon l'âge) ---- */
function kidChallenge(age, theme){
  const R=n=>Math.floor(Math.random()*n);
  const T={
    piscine :{em:'🦆', o1:'bouées 🛟', o2:'ballons 🏐', place:'la piscine', unit:'objets flottants'},
    gravier :{em:'🪨', o1:'galets',    o2:'coquillages 🐚', place:'le jardin', unit:'cailloux'},
    cuisine :{em:'🍅', o1:'olives 🫒', o2:'gâteaux 🧁', place:'la cuisine', unit:'aliments'},
    terrasse:{em:'🛋️', o1:'coussins',  o2:'chaises 🪑', place:'la terrasse', unit:'objets'}
  }[theme] || {em:'⭐', o1:'trucs', o2:'machins', place:'la maison', unit:'objets'};
  const distract=(ans)=>{
    const set=new Set([ans]); let guard=0;
    while(set.size<3 && guard++<60){ const d=ans+(R(2)?1:-1)*(1+R(3)); if(d>=0) set.add(d); }
    let n=ans+4; while(set.size<3){ set.add(n++); }
    return [...set].sort(()=>Math.random()-.5);
  };
  let q, ans;
  if(age<=7){ const k=2+R(3); q=`Compte les ${T.em} près de ${T.place} :<br><span class="bigduck">${T.em.repeat(k)}</span><br>Combien y en a-t-il ?`; ans=k; }
  else if(age<=9){ const a=2+R(4), b=2+R(4); q=`Il y a <b>${a}</b> ${T.o1} et <b>${b}</b> ${T.o2}.<br>Combien de ${T.unit} en tout ?`; ans=a+b; }
  else if(age<=11){ const a=9+R(8), b=2+R(6); q=`Il y a <b>${a}</b> ${T.unit}, puis <b>${b}</b> disparaissent.<br>Combien en reste-t-il ?`; ans=a-b; }
  else if(age<=13){ const a=2+R(8), b=3+R(7); q=`<b>${a}</b> paniers avec <b>${b}</b> ${T.unit} chacun.<br>Combien de ${T.unit} en tout ?`; ans=a*b; }
  else if(age<=15){ const a=3+R(6), b=2+R(6), c=2+R(7); q=`On compte <b>${a}</b>, puis <b>${b}</b>, puis <b>${c}</b> ${T.unit}.<br>Fais le total… puis <b>×2</b> !`; ans=(a+b+c)*2; }
  else { const a=3+R(6), b=3+R(6), c=2+R(6), d=2+R(5); q=`<b>${a}</b> caisses de <b>${b}</b> ${T.unit}, et <b>${c}</b> caisses de <b>${d}</b>.<br>Combien de ${T.unit} en tout ?`; ans=a*b+c*d; }
  return {q, ans, options:distract(ans)};
}

function gameKidDefis(st){
  const stId=st.id;
  if(!S.kidDone[stId]) S.kidDone[stId]={};

/* ---- CAILLOUX MYSTÈRES (indice sous les cailloux) ---- */
function gameClues(){
  const z=document.getElementById('gamezone');
  const word=((S.indiceWord||'TRESOR').toUpperCase().match(/[A-Z]/g)||['T','R','E','S','O','R']).join('');
  const L=word.length;
  let stones=[];
  for(let i=0;i<L;i++) stones.push({type:'letter',pos:i,ch:word[i]});
  const deco=['🐛','🌱','🐜','🦋','🪱','🍂','🐞','🌼'];
  const nEmpty=Math.max(4,Math.min(9,L+2));
  for(let i=0;i<nEmpty;i++) stones.push({type:'empty',ch:deco[i%deco.length]});
  stones.sort(()=>Math.random()-.5);
  const found=new Set(); const lifted={};
  const render=()=>{
    const slots=word.split('').map((c,i)=>`<div class="cslot">${found.has(i)?c:''}</div>`).join('');
    const grid=stones.map((s,idx)=>{
      const up=lifted[idx];
      return `<button class="cstone ${up?'up':''} ${up&&s.type==='letter'?'letter':''}" onclick="window.__cluesTap(${idx})">${up?s.ch:'🪨'}</button>`;
    }).join('');
    z.innerHTML=`<div class="game">
      <div class="q">🪨 Tous ensemble : soulevez les cailloux ! Sous certains se cachent les lettres d'un indice secret. Reconstituez le mot 🔎</div>
      <div class="cslots">${slots}</div>
      <div class="cgrid">${grid}</div>
      <div id="cluesmsg"></div>
    </div>`;
  };
  window.__cluesTap=(idx)=>{
    if(lifted[idx]) return; lifted[idx]=true;
    const s=stones[idx]; if(s.type==='letter') found.add(s.pos);
    render();
    if(found.size===L){ S.cluesFound=true; save();
      setTimeout(()=>{ const m=document.getElementById('cluesmsg');
        if(m) m.innerHTML=`<div class="reward" style="margin-top:12px">
          <div style="font-weight:800;color:var(--wood)">🔎 Indice trouvé !</div>
          <div style="font-family:var(--ff-title);font-size:2rem;color:var(--gold2);letter-spacing:5px">${word}</div>
          <div style="font-weight:700;color:var(--ink2);margin-bottom:8px">Ce mot vous rapproche du trésor 🏴‍☠️</div>
          <button class="btn" onclick="go('map')">Continuer ➜</button></div>`;
        burst(60);
      },300);
    }
  };
  render();
}

function openWheel(i){
  const p=S.players[i], prizes=S.wheelPrizes, n=prizes.length, seg=360/n;
  const cols=['#e0a915','#2a7d73','#c0392b','#2f8f4e','#8B5E3C','#a83d86','#1f6f8b','#c78a06'];
  const stops=[]; for(let k=0;k<n;k++) stops.push(`${cols[k%cols.length]} ${k*seg}deg ${(k+1)*seg}deg`);
  let labels=''; for(let k=0;k<n;k++){ const a=k*seg+seg/2; labels+=`<div class="wlabel" style="transform:rotate(${a}deg) translateY(-88px)"><span style="transform:rotate(${-a}deg)">${k+1}</span></div>`; }
  const z=document.getElementById('gamezone');
  z.innerHTML=`<div class="game" style="text-align:center">
    <button class="hint-btn" style="float:left" onclick="window.__wheelRender()">‹ Retour</button>
    <div class="q" style="clear:both">${grade(p.age).em} Roue de <b>${esc(p.name)||''}</b> 🎡</div>
    <div class="wheelwrap">
      <div class="wpointer">▼</div>
      <div class="wheel" id="wheelEl" style="background:conic-gradient(${stops.join(',')})">${labels}</div>
    </div>
    <button class="btn" id="spinBtn" onclick="spinWheel(${i})">🎯 Tourner la roue !</button>
    <div id="wheelmsg"></div>
  </div>`;
}
function spinWheel(i){
  const prizes=S.wheelPrizes, n=prizes.length, seg=360/n;
  const el=document.getElementById('wheelEl'), btn=document.getElementById('spinBtn');
  if(!el||el.dataset.spun) return; el.dataset.spun='1'; btn.disabled=true;
  const winner=Math.floor(Math.random()*n);
  const target=5*360 + (360-(winner*seg+seg/2));
  el.style.transition='transform 4s cubic-bezier(.17,.67,.28,1)';
  requestAnimationFrame(()=>{ el.style.transform=`rotate(${target}deg)`; });
  setTimeout(()=>{
    S.wheelResult[i]=prizes[winner]; save();
    const m=document.getElementById('wheelmsg');
    if(m) m.innerHTML=`<div class="reward" style="margin-top:12px"><div style="font-weight:800;color:var(--wood)">🎁 Ton trésor :</div><div style="font-family:var(--ff-title);font-size:1.5rem;color:var(--gold2);margin:6px 0">${esc(prizes[winner])}</div><button class="btn" onclick="window.__wheelRender()">Suivant ➜</button></div>`;

  },4200);
}

/* ---- MEMORY (cuisine) ---- */
const FOODS=['🌰','🧀','🍯','🍊','🫒','🐟']; // châtaigne, brocciu, miel, clémentine, olive, poisson
function gameMemory(z){
  let deck=[...FOODS,...FOODS].map((e,i)=>({e,i})).sort(()=>Math.random()-.5);
  let up=[], matched=0, lock=false;
  z.innerHTML=`<div class="game">
    <div class="q">🍽️ Retrouve les paires de saveurs corses !</div>
    <div class="memgrid">${deck.map((c,i)=>`<div class="mcard" data-i="${i}">${c.e}</div>`).join('')}</div>
  </div>`;
  const cards=[...z.querySelectorAll('.mcard')];
  cards.forEach((el,i)=>el.onclick=()=>{
    if(lock||el.classList.contains('up')||el.classList.contains('matched'))return;
    el.classList.add('up'); up.push({el,e:deck[i].e});
    if(up.length===2){
      lock=true;
      if(up[0].e===up[1].e){
        up.forEach(u=>u.el.classList.add('matched')); matched++; up=[]; lock=false;
        if(matched===FOODS.length) setTimeout(completeStation,400);
      }else{
        setTimeout(()=>{ up.forEach(u=>u.el.classList.remove('up')); up=[]; lock=false; },700);
      }
    }
  });
}

/* ---- CAESAR (terrasse de devant) ---- */
function caesarShift(txt,s){
  return txt.replace(/[A-Z]/g,c=>String.fromCharCode((c.charCodeAt(0)-65+s+26)%26+65));
}
function gameCaesar(z){
  const plain="LE PIRATE ADORE LA MER ET LE SOLEIL";
  const enc=caesarShift(plain,3);            // décalage +3
  let shift=0;
  const draw=()=>{
    z.innerHTML=`<div class="game">
      <div class="q">📜 Message secret caché sous le coussin. Tourne la molette pour le lire, puis écris le <b>dernier mot</b> du message.</div>
      <div class="cipher">${caesarShift(enc,shift)}</div>
      <div class="wheel">🔄 <input type="range" min="0" max="25" value="${shift}"><div class="shiftval">${shift}</div></div>
      <div class="ansrow">
        <input id="caesans" placeholder="LE MOT SECRET" autocomplete="off">
        <button class="btn sea small" style="width:auto;padding:0 18px" onclick="checkCaesar()">OK</button>
      </div>
      <div id="caesmsg"></div>
      <button class="hint-btn" onclick="caeHint()">Besoin d'un indice ?</button>
    </div>`;
    const r=z.querySelector('input[type=range]');
    r.oninput=()=>{ shift=+r.value; z.querySelector('.cipher').textContent=caesarShift(enc,shift); z.querySelector('.shiftval').textContent=shift; };
    window.caeHint=()=>{ shift=22; r.value=22; r.oninput(); document.getElementById('caesmsg').innerHTML='<div class="msg win">Presque ! Le mot, c\'est ce qui brille dans le ciel… ☀️</div>'; };
  };
  window.checkCaesar=()=>{
    const v=(document.getElementById('caesans').value||'').trim().toUpperCase().replace(/[^A-Z]/g,'');
    const m=document.getElementById('caesmsg');
    if(v==='SOLEIL'){ completeStation(); }
    else{ m.innerHTML='<div class="msg err">Pas encore… tourne bien la molette pour tout lire !</div>'; }
  };
  draw();
}

/* ---- LOCK (terrasse) : cadenas 4 chiffres ---- */
function gameLock(z){
  const code=[4,5,7,1]; // pattes du chat, doigts d'une main, 3+4, double de 4 moins 7
  let cur=[0,0,0,0];
  const draw=()=>{
    z.innerHTML=`<div class="game">
      <div class="q">🔐 Résous les énigmes, puis compose le code du cadenas !</div>
      <ul class="riddles">
        <li><b>1er chiffre :</b> combien de pattes a un chat ? 🐱</li>
        <li><b>2e chiffre :</b> combien de doigts sur une main ? ✋</li>
        <li><b>3e chiffre :</b> 3 + 4 = ? </li>
        <li><b>4e chiffre :</b> le double de 4, moins 7 = ?</li>
      </ul>
      <div class="lock">${cur.map((n,i)=>`
        <div class="dial">
          <button onclick="dial(${i},1)">▲</button>
          <div class="num" id="d${i}">${n}</div>
          <button onclick="dial(${i},-1)">▼</button>
        </div>`).join('')}</div>
      <button class="btn sea small" onclick="checkLock()">Ouvrir le cadenas</button>
      <div id="lockmsg"></div>
    </div>`;
  };
  window.dial=(i,d)=>{ cur[i]=(cur[i]+d+10)%10; document.getElementById('d'+i).textContent=cur[i]; };
  window.checkLock=()=>{
    const m=document.getElementById('lockmsg');
    if(cur.join('')===code.join('')) completeStation();
    else m.innerHTML='<div class="msg err">Clic-clac… le cadenas résiste ! Revérifie tes calculs.</div>';
  };
  draw();
}

function renderStationFinal(){
  const words = S.enigmaWords.slice(0, STATIONS.length); // les mots dans le bon ordre

  const tiles = words.map((w,i)=>({w, ord:i})).sort(()=>Math.random()-.5);
  let placed = []; // indices d'ordre déjà placés (dans l'ordre de pose)
  const draw=()=>{
    const phrase = placed.map(o=>words[o]).join(' ');
    const remaining = tiles.filter(t=>!placed.includes(t.ord));
    app.innerHTML = `
      <div class="topbar"><button class="back" onclick="go('map')">‹</button><h2 style="font-size:1.3rem">Le Coffre</h2></div>

        <div class="game">
          <div class="phrasebox">${placed.length? placed.map(o=>`<span class="wtile placed">${esc(words[o])}</span>`).join(' ') : '<span style="color:var(--muted);font-weight:600">Touchez les mots dans l\'ordre 1 → 5…</span>'}</div>
          <div class="wtiles">${remaining.map(t=>`<button class="wtile" onclick="placeWord(${t.ord})"><span class="wnum">${t.ord+1}</span>${esc(t.w)}</button>`).join('')}</div>
          ${placed.length?`<button class="btn sea small" onclick="resetPhrase()">↺ Recommencer l'énigme</button>`:''}
          <div id="finalmsg"></div>
        </div>
      </div>`;
    if(placed.length===words.length){
      const m=document.getElementById('finalmsg');
      m.innerHTML=`<div class="reward" style="margin-top:12px"><div style="font-weight:800;color:var(--wood)">🎉 Énigme reconstituée !</div><div style="font-family:var(--ff-title);font-size:1.4rem;color:var(--gold2);margin:6px 0">« ${esc(phrase)} »</div><button class="btn" onclick="go('treasure')">🗝️ Ouvrir le trésor !</button></div>`;
      burst(40);
    }
  };
  window.placeWord=(ord)=>{
    // il faut poser les mots dans l'ordre : le prochain attendu est placed.length

    else {

  draw();
}

        Les enfants forment <b>2 équipes</b> (🦈 vs 🐬) et jouent <b>ensemble</b>. On fait <b>5 étapes</b> autour de la maison. À chaque étape :
        <ul>
          <li>une <b>énigme</b> indique le lieu 🗺️,</li>
          <li><b>chaque enfant</b> touche son prénom et relève <b>son défi</b> (plus ou moins costaud selon son âge) ;</li>
          <li>chaque défi réussi rapporte des <b>points à son équipe</b> 🏆 ;</li>
          <li>quand tout le monde a réussi, l'étape donne <b>un mot de l'énigme</b>.</li>
        </ul>
        À la fin : on remet les 5 mots <b>dans l'ordre</b> pour lire l'énigme qui mène au trésor, on annonce <b>l'équipe qui a le plus de points</b>, et <b>tout le monde</b> trouve le trésor 🎉.
      </div>
    </div>

    <div class="parch" style="padding-top:22px;margin-bottom:14px">
      <div class="section-label" style="color:var(--wood)">💡 5. Bon à savoir</div>
      <div class="guide-txt">
        <ul>
          <li>Les défis sont des <b>calculs adaptés à l'âge</b> : les petits comptent des objets, les grands font des additions, multiplications puis calculs en plusieurs étapes.</li>
          <li>Un défi se <b>retente à volonté</b> : aucun échec possible, on ne peut pas rester bloqué.</li>
          <li>Les équipes sont <b>équilibrées par âge</b> pour que les points restent serrés. Vous pouvez changer les équipes dans « L'équipage ».</li>
          <li>L'<b>énigme du coffre</b> (les 5 mots) est réglable dans le Coin des parents — écrivez une phrase qui mène à votre cachette.</li>
        </ul>
      </div>
    </div>

    <button class="btn" onclick="go('map')">🚩 C'est parti, lancer la chasse !</button>
    <div class="footnote">Bon jeu à toute la tribu, moussaillons ! 🏝️</div>
  `;
}

function resetGame(){
  if(!confirm('Recommencer la chasse à zéro ? (l\'équipage et la cachette sont conservés)'))return;
  S.done={}; S.kidDone={}; S.stationIdx=0; S.wheelResult={}; S.costumeWinner=0; S.danceWinner=0; S.cluesFound=false; save(); go('home');
}

/* Mode test : annuler / valider une épreuve (et ses points) */
function toggleStation(id){
  if(S.done[id]){ delete S.done[id]; S.kidDone[id]={}; }
  else { S.done[id]=true; S.kidDone[id]={}; S.players.forEach((_,i)=>S.kidDone[id][i]=true); }
  save(); renderParents();
}

/* ---------------- CONFETTI ---------------- */
function burst(n){
  const c=document.getElementById('confetti');
  const cols=['#e0a915','#c0392b','#2f8f4e','#2a7d73','#fff','#e8d6a8'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.style.left=Math.random()*100+'vw';
    d.style.background=cols[i%cols.length];
    d.style.animationDuration=(2+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*.5)+'s';
    d.style.transform='rotate('+Math.random()*360+'deg)';
    c.appendChild(d);
    setTimeout(()=>d.remove(),4500);
  }
}

/* ---------------- GO! ---------------- */
render();

/* Service worker (offline) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
